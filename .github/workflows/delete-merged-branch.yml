#
# Delete the PR head branch after merge (not default branch; not forks).
# Optional secret REPO_ACCESS_TOKEN (repo scope) if GITHUB_TOKEN is read-only.

name: Delete branch on merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  delete-branch:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Delete branch
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN != '' && secrets.REPO_ACCESS_TOKEN || github.token }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REPO_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH="$PR_HEAD_REF"
          DEFAULT="$REPO_DEFAULT_BRANCH"
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "$DEFAULT" ]; then
            echo "Skipping delete for branch: $BRANCH"
            exit 0
          fi
          if [[ "$BRANCH" == release-please--* ]]; then
            echo "Skipping delete for release-please branch: $BRANCH"
            exit 0
          fi
          echo "Deleting branch: $BRANCH"
          BRANCH_ENC="${BRANCH//\//%2F}"
          DELETE_OUTPUT=$(gh api \
            --method DELETE \
            "repos/${{ github.repository }}/git/refs/heads/${BRANCH_ENC}" 2>&1)
          DELETE_STATUS=$?
          if [ "$DELETE_STATUS" -ne 0 ]; then
            if echo "$DELETE_OUTPUT" | grep -qi -e "Reference does not exist" -e "Not Found"; then
              echo "Branch may already be deleted or does not exist."
              exit 0
            else
              echo "Failed to delete branch: $BRANCH"
              echo "$DELETE_OUTPUT"
              exit "$DELETE_STATUS"
            fi
          fi
